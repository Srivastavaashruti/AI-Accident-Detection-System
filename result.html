{% extends "base.html" %}
{% block content %}

<div class="card shadow p-4">

<h4>Detection Result</h4>

<h3 class="text-danger">Detection Completed</h3>

<p><strong>Severity:</strong> {{ severity }}</p>

<p>
<b>Severity:</b>
{% if severity == "High" %}
<span class="badge bg-danger">High</span>
{% elif severity == "Medium" %}
<span class="badge bg-warning">Medium</span>
{% else %}
<span class="badge bg-success">Low</span>
{% endif %}
</p>

{% if map_link %}
<a href="{{map_link}}" target="_blank" class="btn btn-primary">
    <i class="fa fa-map"></i> View on Map
</a>
{% endif %}

<hr>

<iframe width="100%" height="300"
src="https://maps.google.com/maps?q={{lat}},{{lon}}&output=embed">
</iframe>

<a href="/dashboard" class="btn btn-dark mt-3">Go to Dashboard</a>

</div>

{% endblock %}
